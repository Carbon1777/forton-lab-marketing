name: monthly_approval_bot

# Forton Lab Phase 1.5 PLAN-05 — TG approval bot polling-в-окне.
#
# Polling-в-окне approach (D-1.5-04, Phase 0 D-07): bot стартует каждые 10
# минут UTC только в первые 3 дня месяца. Pre-flight short-circuit делает
# iter ~10 sec если plan уже approved или отсутствует — типичное use 95
# min/мес из 2000 GH Actions free tier.
on:
  schedule:
    - cron: "*/10 0-23 1-3 * *"
  workflow_dispatch: {}   # ручной trigger для recovery / testing

permissions:
  # Bot читает план через checkout (read), но НЕ пушит сам — все commit'ы
  # идут через BOT_DISPATCH_PAT (fine-grained PAT, не GITHUB_TOKEN). Это
  # разделяет привилегии: workflow-time = только read; mutation = в external
  # secret. Если PAT утечёт — отозвать без пересборки workflow.
  contents: read

concurrency:
  # cancel-in-progress: false — НЕ убиваем уже идущий iter если cron drift
  # сложил два запуска. Пусть текущий завершится по таймауту (~9 min), новый
  # стартует через 10 min cron. (T-1.5-08 mitigation.)
  group: monthly-approval-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    # 540s polling + ~30s startup + 2-min retry headroom = 11 min upper bound
    timeout-minutes: 11
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # bot не делает git push, full history не нужна

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run approval bot
        env:
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
          BOT_DISPATCH_PAT: ${{ secrets.BOT_DISPATCH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: forton-lab-marketing
        run: |
          PYTHONPATH=. python -m src.monthly_approval_bot
