name: preview_bot

on:
  # Триггер ТОЛЬКО через workflow_dispatch. Primary source — Cloudflare Worker
  # `forton-cron-trigger` (cron 0 9 UTC = 12:00 МСК) который POST'ит на GH API
  # /actions/workflows/preview_bot.yml/dispatches. Внешний CF cron надёжен
  # (не throttles как GH Actions scheduled). Один dispatch/день → один
  # long-poll run (timeout-minutes 350 = ~5.5h), бот живёт 12:00-17:30 МСК.
  #
  # GH schedule cron УБРАН: с длинным polling (5.5h) multi-cron создавал бы
  # очередь из 5.5-часовых задач (concurrency cancel-in-progress: false).
  # Incidents 2026-05-11..20 показали GH cron unreliable — CF Worker заменил.
  #
  # Watchdog (preview_watchdog.yml) остаётся backup: если CF Worker не
  # сработал, watchdog обнаружит отсутствие preview и сам dispatch'нет.
  workflow_dispatch: {}

permissions:
  # Bot reads (checkout); все mutations через BOT_DISPATCH_PAT (Contents API),
  # НЕ через GITHUB_TOKEN. publish.yml dispatched через PAT тоже.
  contents: read

concurrency:
  # T-2-06: serialize parallel preview_bot iterations (cron + manual dispatch overlap)
  group: preview-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    # Long-poll window: бот живёт ~5.5h (12:00-17:30 МСК) чтобы late-approve
    # работал весь рабочий день, не только в 12:00-12:11. На approve
    # handle_publish → stop_running → job завершается раньше (не ждёт впустую).
    # Public repo → GitHub Actions unlimited минут, длинный polling бесплатен.
    # GH job hard limit 6h, ставим 350 мин под лимит.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup ffmpeg (для video width/height в preview)
        # Без ffprobe _video_meta() возвращает {} → iOS TG client рендерит
        # видео в неправильном aspect ratio (incident 2026-05-12).
        # Incident 2026-05-13: apt-get install ffmpeg висит на 11 мин до
        # timeout → ВСЕ scheduled cron сегодня дропнулись. Переключаемся
        # на pre-built setup-ffmpeg action — 5-10 секунд вместо apt.
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore drafts/ cache (idempotency между cron runs)
        uses: actions/cache@v4
        with:
          path: drafts/
          key: drafts-${{ github.run_id }}
          restore-keys: |
            drafts-

      - name: Run preview bot (pre-flight gen + polling)
        env:
          # Phase 1.5 secrets reused (single-operator, same TG bot)
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_USER_ID: ${{ secrets.TG_OWNER_USER_ID }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
          # Phase 1 secret (для daily_post_generator)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Phase 1.5 secret (для plan_writer.set_entry_status + dispatch_publish)
          BOT_DISPATCH_PAT: ${{ secrets.BOT_DISPATCH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: PYTHONPATH=. python -m src.preview_bot
