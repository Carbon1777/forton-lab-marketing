name: preview_bot

on:
  schedule:
    # CRITICAL: GH Actions scheduled cron throttles тики на ровные часы
    # (00, 10, 30) часто. Incidents 2026-05-11 (пропущены 09:00-12:14 UTC)
    # и 2026-05-12 (пропущены 09:00-10:03 UTC) — оба ждали preview в 12:00
    # МСК, оба не получили без manual trigger.
    #
    # Multi-cron mitigation: 5 параллельных expressions на разные минуты
    # первого часа окна (09:00, 09:03, 09:07, 09:15, 09:22 UTC). GH
    # throttling редко бьёт сразу все смещения. Concurrency group preview-bot
    # + cancel-in-progress: false → first успешный run grabs, остальные
    # queue (быстро exit'нут потому что entry уже pending).
    #
    # Плюс `*/10 9-19` сохраняем для late-approve и continuous polling.
    - cron: "0 9 * * *"
    - cron: "3 9 * * *"
    - cron: "7 9 * * *"
    - cron: "15 9 * * *"
    - cron: "22 9 * * *"
    - cron: "*/10 9-19 * * *"
  workflow_dispatch: {}

permissions:
  # Bot reads (checkout); все mutations через BOT_DISPATCH_PAT (Contents API),
  # НЕ через GITHUB_TOKEN. publish.yml dispatched через PAT тоже.
  contents: read

concurrency:
  # T-2-06: serialize parallel preview_bot iterations (cron + manual dispatch overlap)
  group: preview-bot
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 11   # 9-min polling + ~30s startup + headroom
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup ffmpeg (для video width/height в preview)
        # Без ffprobe _video_meta() возвращает {} → iOS TG client рендерит
        # видео в неправильном aspect ratio (incident 2026-05-12).
        # Incident 2026-05-13: apt-get install ffmpeg висит на 11 мин до
        # timeout → ВСЕ scheduled cron сегодня дропнулись. Переключаемся
        # на pre-built setup-ffmpeg action — 5-10 секунд вместо apt.
        uses: FedericoCarboni/setup-ffmpeg@v3
        with:
          ffmpeg-version: release

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore drafts/ cache (idempotency между cron runs)
        uses: actions/cache@v4
        with:
          path: drafts/
          key: drafts-${{ github.run_id }}
          restore-keys: |
            drafts-

      - name: Run preview bot (pre-flight gen + polling)
        env:
          # Phase 1.5 secrets reused (single-operator, same TG bot)
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_USER_ID: ${{ secrets.TG_OWNER_USER_ID }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
          # Phase 1 secret (для daily_post_generator)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Phase 1.5 secret (для plan_writer.set_entry_status + dispatch_publish)
          BOT_DISPATCH_PAT: ${{ secrets.BOT_DISPATCH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: PYTHONPATH=. python -m src.preview_bot
