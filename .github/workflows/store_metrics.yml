name: store_metrics

# Phase 5 — Weekly store metrics digest (METRICS-01, D-5-09).
#
# Cron Пн 06:37 UTC = 09:37 МСК.
#  - Sub-hour offset (37 мин) — митигация MAJ-1 cron-drift: на ровные часы у
#    GH Actions throttling под пиковую нагрузку, на 37-й минуте час планируется
#    стабильнее (verified Phase 0).
#  - Concurrency group=store-metrics + cancel-in-progress=false — две
#    параллельные сборки никогда не пересекаются (T-MAJ-1 mitigation); если
#    предыдущий запуск завис, новый стартует только после его завершения.
#
# Self-heal: см. отдельный workflow `store_metrics_self_heal.yml` —
# проверка `last_successful_run_utc` каждые 6 часов (D-5-09, METRICS-06).
#
# Canonical full-auto mode (2026-05-15 final):
#   - Apple installs: stub (blocked by Apple cert recovery), ratings via RSS.
#   - Google Play installs+reviews: full auto via GCS bucket + androidpublisher.
#   - RuStore installs: stub (Mail.ru API limitation), reviews via JWS.
# Manual CSV mode removed — юзер отверг ручную загрузку 2026-05-15.
#
# Snapshot commit: digest сохраняет `.metrics/store_snapshots.json` для WoW
# и 4w-trend (D-5-04). Снапшот коммитится обратно в repo через
# `BOT_DISPATCH_PAT` (тот же fine-grained PAT что Phase 1.5 — Contents:write,
# single-repo binding).
on:
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # commit snapshot JSON в repo

concurrency:
  group: store-metrics
  cancel-in-progress: false

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.BOT_DISPATCH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect + render + send digest
        env:
          # ------------ TG (planner bot, Phase 1.5 inheritance) ------------
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}

          # ------------ Apple App Store — RSS ratings only (auto, no auth) -------
          # Installs path заблокирован Apple cert recovery — нет ASC API Key
          # (Brain decision 2026-05-14, still ongoing 2026-05-15). Когда Apple
          # Support восстановит cert и юзер сгенерит API Key — добавим сюда
          # ASC_KEY_ID + ASC_ISSUER_ID + ASC_PRIVATE_KEY и развернём JWT path
          # в src/store_metrics/asc.py. Сейчас installs=None с явным error
          # сообщением; ratings продолжают работать через iTunes RSS (no auth).
          # Старые ASC_REPORTER_ACCESS_TOKEN / ASC_VENDOR_NUMBER (для
          # deprecated itc-reporter API) больше не используются — можно
          # удалить из GH Secrets когда удобно.
          ASC_APP_ID_CENTRY: ${{ secrets.ASC_APP_ID_CENTRY }}
          ASC_APP_ID_DIKTUM: ${{ secrets.ASC_APP_ID_DIKTUM }}

          # ------------ Google Play — full auto (GCS + androidpublisher) ---------
          # Installs via GCS bucket `pubsite_prod_rev_<developer_id>` ->
          # stats/installs/installs_<pkg>_YYYYMM_country.csv (UTF-16 LE BOM).
          # Reviews via androidpublisher v3. Service Account
          # `play-metrics-reader@forton-lab-publisher.iam.gserviceaccount.com`
          # должен быть приглашён в Play Console с правом «Просмотр информации
          # и массовое скачивание отчётов» (Brain decision 2026-05-14 confirmed).
          # Android Developer API enabled в GCP project (user confirmed
          # 2026-05-15: Status = Enabled).
          GOOGLE_PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SA_JSON }}
          GPLAY_DEVELOPER_ID: ${{ secrets.GPLAY_DEVELOPER_ID }}
          GPLAY_PACKAGE_CENTRY: ${{ secrets.GPLAY_PACKAGE_CENTRY }}
          GPLAY_PACKAGE_DIKTUM: ${{ secrets.GPLAY_PACKAGE_DIKTUM }}

          # ------------ RuStore — reviews via JWS API (installs N/A) -------------
          # Installs не доступны через Public API (Mail.ru ограничение,
          # Brain Q3 2026-05-14 — full Console method list reviewed, нет
          # statistics endpoint). Reviews via JWS RSA-SHA512 auth + paginated
          # /public/v1/application/<package>/comment. Если HTTP 400 на auth
          # сохраняется — rating=None, но это не блокирует digest.
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_COMPANY_ID: ${{ secrets.RUSTORE_COMPANY_ID }}
          RUSTORE_PACKAGE_CENTRY: ${{ secrets.RUSTORE_PACKAGE_CENTRY }}
          RUSTORE_PACKAGE_DIKTUM: ${{ secrets.RUSTORE_PACKAGE_DIKTUM }}

          # ------------ Anthropic Haiku 4.5 — hypothesis injection ---------
          # METRICS-09 / D-5-06. Если ключа нет — digest идёт без секции
          # «💡 Гипотезы недели» (graceful fallback в `hypothesis.py`).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONPATH=. python -m src.store_metrics.cli

      - name: Commit updated snapshots
        env:
          GIT_AUTHOR_NAME: forton-metrics-bot
          GIT_AUTHOR_EMAIL: forton-metrics-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: forton-metrics-bot
          GIT_COMMITTER_EMAIL: forton-metrics-bot@users.noreply.github.com
        run: |
          if git diff --quiet .metrics/store_snapshots.json 2>/dev/null; then
            echo "snapshot unchanged — no commit"
            exit 0
          fi
          git add .metrics/store_snapshots.json
          git commit -m "auto: weekly store metrics snapshot [skip ci]"
          git pull --rebase
          git push
