name: store_metrics

# Phase 5 — Weekly store metrics digest (METRICS-01, D-5-09).
#
# Cron Пн 06:37 UTC = 09:37 МСК.
#  - Sub-hour offset (37 мин) — митигация MAJ-1 cron-drift: на ровные часы у
#    GH Actions throttling под пиковую нагрузку, на 37-й минуте час планируется
#    стабильнее (verified Phase 0).
#  - Concurrency group=store-metrics + cancel-in-progress=false — две
#    параллельные сборки никогда не пересекаются (T-MAJ-1 mitigation); если
#    предыдущий запуск завис, новый стартует только после его завершения.
#
# Self-heal: см. отдельный workflow `store_metrics_self_heal.yml` —
# проверка `last_successful_run_utc` каждые 6 часов (D-5-09, METRICS-06).
#
# Snapshot commit: digest сохраняет `.metrics/store_snapshots.json` для WoW
# и 4w-trend (D-5-04). Снапшот коммитится обратно в repo через
# `BOT_DISPATCH_PAT` (тот же fine-grained PAT что Phase 1.5 — Contents:write,
# single-repo binding).
on:
  schedule:
    - cron: "37 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # commit snapshot JSON в repo

concurrency:
  group: store-metrics
  cancel-in-progress: false

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.BOT_DISPATCH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect + render + send digest
        env:
          # ------------ TG (planner bot, Phase 1.5 inheritance) ------------
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}

          # ------------ Apple App Store — manual CSV + iTunes RSS ----------
          # Canonical pivot 2026-05-15: installs читаются из ручного CSV
          # `.metrics/asc_weekly/<YYYY-Www>.csv` (Apple Sales Reports →
          # Weekly Summary download). Ratings через iTunes RSS — no auth.
          # ASC_REPORTER_ACCESS_TOKEN / ASC_VENDOR_NUMBER больше не нужны
          # этому модулю (Reporter Token = UUID для deprecated itc-reporter
          # API, modern Sales Reports API его отвергает).
          ASC_APP_ID_CENTRY: ${{ secrets.ASC_APP_ID_CENTRY }}
          ASC_APP_ID_DIKTUM: ${{ secrets.ASC_APP_ID_DIKTUM }}

          # ------------ Google Play — manual CSV + androidpublisher --------
          # Canonical pivot 2026-05-15: installs читаются из ручного CSV
          # `.metrics/gplay_weekly/<YYYY-Www>.csv` (Play Console Statistics
          # → Export CSV). Reviews через androidpublisher v3 — опционально,
          # SA credentials. GPLAY_DEVELOPER_ID больше не нужен (был только
          # для конструкции GCS bucket name — путь deprecated).
          GOOGLE_PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SA_JSON }}
          GPLAY_PACKAGE_CENTRY: ${{ secrets.GPLAY_PACKAGE_CENTRY }}
          GPLAY_PACKAGE_DIKTUM: ${{ secrets.GPLAY_PACKAGE_DIKTUM }}

          # ------------ RuStore — JWS RSA-SHA512 reviews + manual CSV ------
          # Private key в multi-line PEM. Public key зарегистрирован в
          # Console под `RUSTORE_KEY_ID`. Installs читаются из ручного
          # CSV `.metrics/rustore_weekly/<YYYY-Www>.csv` (D-5 2026-05-14 —
          # API статистики не существует).
          RUSTORE_PRIVATE_KEY: ${{ secrets.RUSTORE_PRIVATE_KEY }}
          RUSTORE_KEY_ID: ${{ secrets.RUSTORE_KEY_ID }}
          RUSTORE_COMPANY_ID: ${{ secrets.RUSTORE_COMPANY_ID }}
          RUSTORE_PACKAGE_CENTRY: ${{ secrets.RUSTORE_PACKAGE_CENTRY }}
          RUSTORE_PACKAGE_DIKTUM: ${{ secrets.RUSTORE_PACKAGE_DIKTUM }}

          # ------------ Anthropic Haiku 4.5 — hypothesis injection ---------
          # METRICS-09 / D-5-06. Если ключа нет — digest идёт без секции
          # «💡 Гипотезы недели» (graceful fallback в `hypothesis.py`).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: PYTHONPATH=. python -m src.store_metrics.cli

      - name: Commit updated snapshots
        env:
          GIT_AUTHOR_NAME: forton-metrics-bot
          GIT_AUTHOR_EMAIL: forton-metrics-bot@users.noreply.github.com
          GIT_COMMITTER_NAME: forton-metrics-bot
          GIT_COMMITTER_EMAIL: forton-metrics-bot@users.noreply.github.com
        run: |
          if git diff --quiet .metrics/store_snapshots.json 2>/dev/null; then
            echo "snapshot unchanged — no commit"
            exit 0
          fi
          git add .metrics/store_snapshots.json
          git commit -m "auto: weekly store metrics snapshot [skip ci]"
          git pull --rebase
          git push
