name: weekly_csv_reminder

# Phase 5 — еженедельный нудж юзеру положить **3 CSV** (ASC + GPlay + RuStore).
#
# Canonical pivot 2026-05-15: installs для всех 3 сторов читаются из ручных
# CSV файлов в `.metrics/{asc,gplay,rustore}_weekly/<YYYY-Www>.csv`. API-пути
# заблокированы:
#   - Apple Reporter Token = UUID для deprecated itc-reporter; modern Sales
#     Reports API отвергает его как improperly configured bearer token.
#     Integrations path (JWT) заблокирован cert recovery.
#   - Google Play GCS bucket access fails (IAM scope / hidden whitespace,
#     diagnostic step output masked by GH Actions — undebuggable remotely).
#   - RuStore Public API не отдаёт статистику (Brain decision 2026-05-14).
#
# Manual CSV — это canonical solution: 5 минут юзера в воскресенье,
# но reliable, predictable, doesn't depend on Apple/Google flakiness.
#
# Reminder шлётся в TG-канал «Планировщик» в воскресенье 18:00 МСК, чтобы
# понедельничный `store_metrics.yml` 09:37 МСК нашёл свежие CSV.
#
# Если файл какого-то стора не положен — соответствующий fetcher вернёт
# installs=None + error string, digest отрисует прочерк и алерт.
on:
  schedule:
    - cron: "0 15 * * 0"   # Sun 15:00 UTC = 18:00 МСК
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: weekly-csv-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: pip install "requests==2.32.3"

      - name: Send TG reminder
        env:
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
        run: |
          PYTHONPATH=. python <<'PY'
          import datetime as dt
          import os

          import requests

          today = dt.date.today()
          iso = today.isocalendar()
          week_key = f"{iso.year}-W{iso.week:02d}"

          token = os.environ.get("TG_PLANNER_BOT_TOKEN")
          chat = os.environ.get("TG_OWNER_CHAT_ID")
          if not token or not chat:
              raise SystemExit(
                  "ERROR: TG_PLANNER_BOT_TOKEN / TG_OWNER_CHAT_ID missing"
              )

          text = (
              f"📋 <b>Weekly CSV reminder ({week_key})</b>\n\n"
              "До понедельника <b>09:30 МСК</b> положи <b>3 CSV</b> в репо:\n\n"
              "• <code>.metrics/asc_weekly/" + week_key + ".csv</code>\n"
              "  ↳ ASC → Sales and Trends → Reports → "
              "Weekly Summary за прошлую неделю → Download\n\n"
              "• <code>.metrics/gplay_weekly/" + week_key + ".csv</code>\n"
              "  ↳ Play Console → Statistics → Export CSV за прошлую неделю\n\n"
              "• <code>.metrics/rustore_weekly/" + week_key + ".csv</code>\n"
              "  ↳ RuStore Console → Аналитика → Скачать CSV за прошлую неделю\n\n"
              "Переименуй каждый файл в <code>" + week_key + ".csv</code>, "
              "положи в соответствующую папку <code>marketing-v3/.metrics/</code> "
              "и закоммить в <code>main</code>.\n\n"
              "<i>Без CSV digest придёт с пометкой «&lt;store&gt; CSV не "
              "положен» в секции 🚨 Алерты — это не блокирует digest, "
              "но installs по этому стору будут прочерком.</i>"
          )
          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={
                  "chat_id": chat,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True,
              },
              timeout=15,
          )
          resp.raise_for_status()
          print(f"Reminder sent for {week_key}")
          PY
