name: preview_watchdog

# Phase 2.5 GH cron throttling guard. Если scheduled preview_bot.yml тик
# в 12:00 МСК (= 09:00 UTC) пропущен GitHub'ом — watchdog обнаруживает
# отсутствие preview для today's plan entry и триггерит preview_bot.yml
# вручную через workflow_dispatch.
#
# Multi-checkpoint (incident 2026-05-12 показал что watchdog САМ может быть
# throttled GH cron): 4 checkpoint'a на разные смещения минут.
#   09:33 UTC = 12:33 МСК — через 33 мин после ожидаемого первого preview.
#   09:47 UTC = 12:47 МСК — late страховка первого окна.
#   11:33 UTC = 14:33 МСК — middle-day backup.
#   13:33 UTC = 16:33 МСК — last-resort вечерний.

on:
  schedule:
    - cron: "33 9 * * *"
    - cron: "47 9 * * *"
    - cron: "33 11 * * *"
    - cron: "33 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: preview-watchdog
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # drafts/ нужен чтобы определить «preview уже был отправлен»
      # (entry.status=draft + drafts/<slug>.md exists → state=pending,
      # alert не нужен). Без restore watchdog ложно сработает.
      - name: Restore drafts/ cache (Phase 2 idempotency)
        uses: actions/cache@v4
        with:
          path: drafts/
          key: drafts-watchdog-${{ github.run_id }}
          restore-keys: |
            drafts-

      - name: Run watchdog
        env:
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
          BOT_DISPATCH_PAT: ${{ secrets.BOT_DISPATCH_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: PYTHONPATH=. python -m src.preview_watchdog
