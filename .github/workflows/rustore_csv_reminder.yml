name: rustore_csv_reminder

# Phase 5 — еженедельный нудж юзеру положить RuStore CSV (D-5-09).
#
# RuStore Public API НЕ отдаёт installs/downloads (Q3 в CLAUDE.md закрыт
# 2026-05-14 — у API только 9 read-only методов, ни одного со статистикой).
# Поэтому installs берутся из ручного CSV который юзер скачивает из
# `console.rustore.ru` раз в неделю.
#
# Этот workflow шлёт нудж в TG-канал «Планировщик» в воскресенье 18:00 МСК,
# чтобы понедельничный `store_metrics.yml` 09:37 МСК нашёл свежий CSV в
# `.metrics/rustore_weekly/<YYYY-Www>.csv`.
#
# Если файл не положен — `rustore.py` отрисует прочерк и `digest.py`
# добавит в секцию 🚨 Алерты строку «RuStore CSV не положен за <week>».
on:
  schedule:
    - cron: "0 15 * * 0"   # Sun 15:00 UTC = 18:00 МСК
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: rustore-csv-reminder
  cancel-in-progress: false

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install minimal deps
        run: pip install "requests==2.32.3"

      - name: Send TG reminder
        env:
          TG_PLANNER_BOT_TOKEN: ${{ secrets.TG_PLANNER_BOT_TOKEN }}
          TG_OWNER_CHAT_ID: ${{ secrets.TG_OWNER_CHAT_ID }}
        run: |
          PYTHONPATH=. python <<'PY'
          import datetime as dt
          import os

          import requests

          today = dt.date.today()
          iso = today.isocalendar()
          week_key = f"{iso.year}-W{iso.week:02d}"

          token = os.environ.get("TG_PLANNER_BOT_TOKEN")
          chat = os.environ.get("TG_OWNER_CHAT_ID")
          if not token or not chat:
              raise SystemExit(
                  "ERROR: TG_PLANNER_BOT_TOKEN / TG_OWNER_CHAT_ID missing"
              )

          text = (
              f"📋 <b>RuStore CSV reminder ({week_key})</b>\n\n"
              "Положи CSV с installs за эту неделю в "
              f"<code>.metrics/rustore_weekly/{week_key}.csv</code> "
              "до завтра 09:30 МСК.\n\n"
              "<b>Шаги:</b>\n"
              "1. Открой RuStore Console → Аналитика → Скачать CSV "
              "(период: текущая ISO-неделя пн-вс)\n"
              f"2. Переименуй файл в <code>{week_key}.csv</code>\n"
              "3. Положи в <code>marketing-v3/.metrics/rustore_weekly/</code> "
              "и закоммить в <code>main</code>\n\n"
              "<i>Если забудешь — digest придёт с пометкой "
              "«RuStore CSV не положен» в секции 🚨 Алерты.</i>"
          )
          resp = requests.post(
              f"https://api.telegram.org/bot{token}/sendMessage",
              json={
                  "chat_id": chat,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True,
              },
              timeout=15,
          )
          resp.raise_for_status()
          print(f"Reminder sent for {week_key}")
          PY
